<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>EchoTree Share Settings</title>
    <style>
      :root {
        --bg: #ffffff;
        --bg-accent: #f6fbf3;
        --ink: #0b5d1e;
        --accent: #5aaa95;
        --accent-strong: #3f8d79;
        --muted: #467363;
        --border: rgba(11, 93, 30, 0.16);
        --field: #ffffff;
        --on-accent: #fff8f2;
        --radius-control: 10px;
      }
      * { box-sizing: border-box; }
      body {
        font-family: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", Palatino, Georgia, serif;
        margin: 24px;
        max-width: 680px;
        color: var(--ink);
        background: linear-gradient(180deg, var(--bg) 0%, var(--bg-accent) 100%);
      }
      label { display: block; margin-bottom: 6px; font-weight: 600; }
      input { width: 100%; padding: 10px; font: inherit; font-size: 14px; border: 1px solid var(--border); border-radius: var(--radius-control); background: var(--field); color: var(--ink); }
      input:focus { outline: 2px solid rgba(90, 170, 149, 0.22); border-color: var(--accent); }
      button { display: inline-flex; align-items: center; justify-content: center; min-height: 24px; margin-top: 10px; padding: 5px 10px 4px; border: 1px solid var(--accent); background: var(--accent); color: var(--on-accent); border-radius: var(--radius-control); font: inherit; font-size: 11px; line-height: 1; cursor: pointer; }
      button:hover { background: var(--accent-strong); border-color: var(--accent-strong); }
      .muted { color: var(--muted); font-size: 13px; }
      .status { margin-top: 10px; font-size: 13px; }
    </style>
  </head>
  <body>
    <h2>EchoTree Share Settings</h2>
    <p class="muted">Set the base URL for your EchoTree app.</p>
    <label for="base-url">EchoTree Base URL</label>
    <input id="base-url" type="url" placeholder="https://your-domain.com" />
    <button id="save">Save</button>
    <div id="status" class="status"></div>

    <p class="muted" style="margin-top: 16px;">
      Example: <code>https://danielpradilla.info</code> or <code>http://localhost:8000</code>
    </p>
    <script src="options.js"></script>
  </body>
</html>
