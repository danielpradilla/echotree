<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>EchoTree Share</title>
    <style>
      :root {
        --bg: #ffffff;
        --ink: #0b5d1e;
        --accent: #5aaa95;
        --accent-strong: #3f8d79;
        --muted: #467363;
        --border: rgba(11, 93, 30, 0.16);
        --surface-hover: rgba(246, 251, 243, 0.92);
        --field: #ffffff;
        --on-accent: #fff8f2;
        --danger: #a12a2a;
        --radius-control: 10px;
      }
      * { box-sizing: border-box; }
      body {
        font-family: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", Palatino, Georgia, serif;
        margin: 12px;
        width: 320px;
        color: var(--ink);
        background: var(--bg);
      }
      .muted { color: var(--muted); font-size: 12px; }
      .url { font-size: 12px; background: var(--surface-hover); border: 1px solid var(--border); border-radius: var(--radius-control); padding: 8px; word-break: break-all; max-height: 80px; overflow: auto; }
      .actions { margin-top: 10px; display: flex; gap: 8px; }
      button, a.button { display: inline-flex; align-items: center; justify-content: center; min-height: 24px; padding: 5px 10px 4px; border-radius: var(--radius-control); border: 1px solid var(--accent); background: var(--accent); color: var(--on-accent); text-decoration: none; font: inherit; font-size: 11px; line-height: 1; cursor: pointer; }
      button:hover, a.button:hover { background: var(--accent-strong); border-color: var(--accent-strong); color: var(--on-accent); }
      a.secondary { background: var(--field); color: var(--ink); border-color: var(--border); }
      a.secondary:hover { background: var(--surface-hover); border-color: var(--accent); }
      .error { color: var(--danger); font-size: 12px; }
    </style>
  </head>
  <body>
    <h3 style="margin: 0 0 8px 0;">EchoTree Share</h3>
    <div class="muted">Current tab URL</div>
    <div id="current-url" class="url">Loading…</div>
    <p id="error" class="error" style="display:none;"></p>
    <div class="actions">
      <button id="open-share">Open in EchoTree</button>
      <a class="button secondary" href="options.html" target="_blank" rel="noopener">Settings</a>
    </div>
    <p class="muted" style="margin-top: 8px;">
      This opens your existing <code>/share</code> page with the URL prefilled.
    </p>
    <script src="popup.js"></script>
  </body>
</html>
